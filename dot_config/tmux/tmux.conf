set  -g default-terminal "foot"
set  -g base-index      1
setw -g pane-base-index 1

set -g status-keys emacs
set -g mode-keys   emacs

# rebind main key: M-x
unbind C-b
set -g prefix M-x
bind -n -N "Send the prefix key through to the application" \
  M-x send-prefix

set  -g mouse             on
set  -g focus-events      off
setw -g aggressive-resize off
setw -g clock-mode-style  24
set  -s escape-time       500
set  -g history-limit     2000

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'o0th/tmux-nova'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/yank'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 

set -g status-interval 10
set -g status-left-length 100
set -g status-right-length 100
set -g @nova-rows 0

set -g @nova-pane-active-border-style "#44475a"
set -g @nova-pane-border-style "#282a36"
set -g @nova-status-style-bg "#4c566a"
set -g @nova-status-style-fg "#d8dee9"
set -g @nova-status-style-active-bg "#88c0d0"
set -g @nova-status-style-active-fg "#2e3440"
set -g @nova-status-style-double-bg "#2e3440"

set -g @nova-pane "#I#{?pane_in_mode,  #{pane_mode},}  #W"

set -g @nova-segment-clock "#(date +%H:%M)"
set -g @nova-segment-clock-colors "#88c0d0 #2e3440"

set -g @nova-segment-cputemp "#(~/.config/tmux/cputemp.sh)"
set -g @nova-segment-cputemp-colors "#be9db8 #2e3440"

set -g @nova-segment-battery "#(acpi | sed 's/Battery 0: //g')"
set -g @nova-segment-battery-colors "#81a1c1 #2e3440"

set -g @nova-segments-0-left ""
set -g @nova-segments-0-right "cputemp battery clock"

